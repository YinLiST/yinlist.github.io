<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告 - 影特驿站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: rgb(192, 192, 192);
            --secondary: rgb(64, 64, 64);
            --primary-rgb: 192, 192, 192;
            --secondary-rgb: 64, 64, 64;
        }

        body {
            font-family: sans-serif;
            color: #333;
            line-height: 1.6;
            background: rgb(255, 255, 255);
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(var(--secondary-rgb), 0.95);
            padding: 1rem 2rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        nav ul {
            display: flex;
            justify-content: center;
            gap: 3rem;
            list-style: none;
        }

        nav a {
            color: rgba(var(--primary-rgb), 0.9);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: rgb(255, 255, 255);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        nav a.active {
            color: rgb(255, 255, 255);
        }

        .page-header {
            padding: 8rem 2rem 3rem;
            text-align: center;
            background: rgb(255, 255, 255);
        }

        .page-cover {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .page-header h1 {
            font-family: sans-serif;
            font-size: 3rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .page-header p {
            font-family: sans-serif;
            font-size: 1.2rem;
            color: var(--secondary);
            opacity: 0.8;
            position: relative;
            z-index: 1;
        }

        .page-cover {
            font-size: 5rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .category-tab {
            font-family: sans-serif;
            padding: 0.8rem 2rem;
            background: white;
            border: 2px solid var(--secondary);
            border-radius: 30px;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .category-tab:hover {
            background: var(--primary);
            color: var(--secondary);
            transform: translateY(-2px);
        }

        .category-tab.active {
            background: var(--secondary);
            color: var(--primary);
        }

        .announcements-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .project-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(var(--secondary-rgb), 0.1);
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-image {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background-size: cover;
            background-position: center;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-info {
            padding: 1.5rem;
        }

        .project-info h3 {
            font-family: sans-serif;
            color: var(--secondary);
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .project-info p {
            font-family: sans-serif;
            color: #666;
            margin-bottom: 1rem;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .meta-date {
            color: #888;
            font-family: sans-serif;
        }

        .meta-tag {
            background: rgba(var(--primary-rgb), 0.3);
            color: var(--secondary);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-family: sans-serif;
        }

        .view-more-btn {
            font-family: sans-serif;
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: var(--secondary);
            color: var(--primary);
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .view-more-btn:hover {
            background: var(--primary);
            color: var(--secondary);
            transform: translateY(-2px);
        }

        footer {
            background: rgba(var(--secondary-rgb), 0.95);
            color: var(--primary);
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        @media (max-width: 992px) {
            .announcements-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            nav ul {
                gap: 1.5rem;
                font-size: 0.9rem;
            }

            .page-header {
                padding: 6rem 2rem 3rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .page-cover {
                font-size: 4rem;
                margin-bottom: 0.5rem;
            }

            .category-tabs {
                gap: 0.5rem;
            }

            .category-tab {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }

            .announcements-list {
                grid-template-columns: repeat(2, 1fr);
            }

            .project-info {
                padding: 1rem;
            }

            .project-image {
                height: 150px;
                font-size: 3rem;
            }

            .project-info h3 {
                font-size: 1.1rem;
            }

            .container {
                padding: 2rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 0.8rem 1rem;
            }

            nav ul {
                gap: 1rem;
                font-size: 0.85rem;
            }

            .page-header {
                padding: 6rem 1rem 2rem;
            }

            .page-header h1 {
                font-size: 1.8rem;
            }

            .page-header p {
                font-size: 1rem;
            }

            .announcements-list {
                grid-template-columns: 1fr;
            }

            .project-info h3 {
                font-size: 1.1rem;
            }

            .project-info p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">主页</a></li>
            <li><a href="announcements.html" class="active">公告</a></li>
            <li><a href="projects.html">作品</a></li>
            <li><a href="about.html">关于</a></li>
        </ul>
    </nav>

    <header class="page-header">
        <div class="page-cover">📢</div>
        <h1>公告</h1>
        <p>了解最新动态和重要通知</p>
    </header>

    <main class="container">
        <div class="category-tabs">
            <button class="category-tab active" data-category="all">全部</button>
            <button class="category-tab" data-category="news">新闻</button>
            <button class="category-tab" data-category="update">更新</button>
            <button class="category-tab" data-category="activity">活动</button>
        </div>

        <div class="announcements-list" id="announcements-container">
        </div>
    </main>

    <footer>
        <p>© 2026 殷离ST</p>
        <p>使用Trae AI制作，使用模型：MiniMax-M2.1</p>
    </footer>

    <script>
        let allAnnouncements = [];

        async function loadAnnouncements() {
            try {
                const response = await fetch('/announcements.json');
                const data = await response.json();
                allAnnouncements = data.announcements;
                renderAnnouncements('all');
            } catch (error) {
                console.error('加载公告失败:', error);
            }
        }

        function renderAnnouncements(category) {
            const container = document.getElementById('announcements-container');
            container.innerHTML = '';

            let filtered = category === 'all' 
                ? allAnnouncements 
                : allAnnouncements.filter(item => item.category === category);

            filtered.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return dateB - dateA;
            });

            filtered.forEach((item, index) => {
                const card = document.createElement('article');
                card.className = 'project-card';
                card.dataset.category = item.category;
                card.innerHTML = `
                    <div class="project-image"><img src="${item.icon}" alt="${item.title}"></div>
                    <div class="project-info">
                        <div class="project-meta">
                            <span class="meta-date">${item.date}</span>
                            <span class="meta-tag">${item.categoryName}</span>
                        </div>
                        <h3>[${item.id}] ${item.title}</h3>
                        <p>${item.content}</p>
                        <a href="#" class="view-more-btn">查看详情 →</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        const categoryTabs = document.querySelectorAll('.category-tab');
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                categoryTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderAnnouncements(tab.dataset.category);
            });
        });

        loadAnnouncements();
    </script>
</body>
</html>
